version: "3.9"

services:
  apex-api:
    build: .
    container_name: apex-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./config:/app/config
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - APEX_LOG_LEVEL=INFO
    restart: unless-stopped

  apex-frontend:
    build: ./frontend
    container_name: apex-frontend
    ports:
      - "5173:5173"
    depends_on:
      - apex-api
    environment:
      - VITE_API_URL=http://localhost:8000
